g = "goto_next_change"
G = "goto_last_change"
f = "goto_next_function"
t = "goto_next_class"
a = "goto_next_parameter"
c = "goto_next_comment"
e = "goto_next_entry"
T = "goto_next_test"
p = "goto_next_paragraph"
x = "goto_next_xml_element"
space = "add_newline_below"

# ─────────────────────────────────────────────────────────────────────────────
# Normal: View minor mode (z / Z sticky)
# ─────────────────────────────────────────────────────────────────────────────

[keys.normal.z]
z = "align_view_center"
c = "align_view_center"
t = "align_view_top"
b = "align_view_bottom"
m = "align_view_middle"
k = "scroll_up"
up = "scroll_up"
j = "scroll_down"
down = "scroll_down"
"C-b" = "page_up"
pageup = "page_up"
"C-f" = "page_down"
pagedown = "page_down"
"C-u" = "page_cursor_half_up"
backspace = "page_cursor_half_up"
"C-d" = "page_cursor_half_down"
space = "page_cursor_half_down"
"/" = "search"
"?" = "rsearch"
n = "search_next"
