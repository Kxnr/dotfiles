[keys.normal.Z]
z = "align_view_center"
c = "align_view_center"
t = "align_view_top"
b = "align_view_bottom"
m = "align_view_middle"
k = "scroll_up"
up = "scroll_up"
j = "scroll_down"
down = "scroll_down"
"C-b" = "page_up"
pageup = "page_up"
"C-f" = "page_down"
pagedown = "page_down"
"C-u" = "page_cursor_half_up"
backspace = "page_cursor_half_up"
"C-d" = "page_cursor_half_down"
space = "page_cursor_half_down"
"/" = "search"
"?" = "rsearch"
