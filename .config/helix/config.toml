# ─────────────────────────────────────────────────────────────────────────────
# Normal: Selection manipulation minor mode (,)
#   ,, = ensure cursor at start of selection (ensure-forward then flip)
# ─────────────────────────────────────────────────────────────────────────────

[keys.normal.","]
"," = "ensure_selections_forward"
space = "keep_selections"
k = "keep_primary_selection"
K = "remove_primary_selection"
d = "remove_selections"
n = "rotate_selections_forward"
N = "rotate_selections_backward"
s = "split_selection"
S = "split_selection_on_newline"
r = "select_regex"
"=" = "align_selections"
j = "save_selection"
";" = "collapse_selection"
"~" = "flip_selections"

