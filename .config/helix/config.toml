"A-w" = "extend_next_sub_word_start"
"A-b" = "extend_prev_sub_word_start"
"A-e" = "extend_next_sub_word_end"

# Parent-node extend (select mode uses extend_ variants)
"A-k" = "expand_selection"
"A-j" = "shrink_selection"
# Sibling extend in select mode
"A-l" = "extend_next_sibling"
"A-h" = "extend_prev_sibling"

n = "extend_search_next"
N = "extend_search_prev"

t = "extend_till_char"
