[keys.normal."["]
"[" = "move_parent_node_start"
d = "goto_prev_diag"
D = "goto_first_diag"
g = "goto_prev_change"
G = "goto_first_change"
f = "goto_prev_function"
t = "goto_prev_class"
a = "goto_prev_parameter"
c = "goto_prev_comment"
e = "goto_prev_entry"
T = "goto_prev_test"
p = "goto_prev_paragraph"
