theme = "gruvbox"

[editor]
line-number = "relative"
mouse = false
auto-save = true
true-color = true
rulers = [100]
color-modes = true
cursorline = true
text-width = 100
idle-timeout = 50
completion-timeout = 50
trim-final-newlines = true
trim-trailing-whitespace = true
insert-final-newline = false
shell = []

[editor.inline-diagnostics]
cursor-line = "hint"
other-lines = "disable"

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "block"

[editor.file-picker]
hidden = true

[editor.lsp]
display-messages = true
display-inlay-hints = true

[editor.whitespace.render]
space = "all"
tab = "all"
nbsp = "none"
nnbsp = "none"
newline = "all"

[editor.whitespace.characters]
space = "·"
nbsp = "⍽"
nnbsp = "␣"
tab = "→"
newline = "⏎"
tabpad = "·"

[editor.soft-wrap]
enable = true

[editor.indent-guides]
render = true

[editor.statusline]
left = ["mode", "spinner", "file-modification-indicator", "file-name"]
center = []
right = ["diagnostics", "selections", "position", "position-percentage", "file-encoding", "file-type", "version-control"]
separator = "│"
mode.normal = "N"
mode.insert = "I"
mode.select = "S"

# ─────────────────────────────────────────────────────────────────────────────
# Normal mode
# ─────────────────────────────────────────────────────────────────────────────
#
# Modifier semantics:
#   Alt   → destructive/yank variant (where default is noyank, or vice versa)
#         → sub-word variant (smaller granularity than plain word)
#   Shift → reverse direction or "bigger" variant (word→WORD)
#   Ctrl  → cursor/view movement (vs text manipulation)
#
# , is the selection-manipulation minor mode
# [ and ] minor modes extend the default bracket navigation cluster

[keys.normal]
# Basic movement
h = "move_char_left"
left = "move_char_left"
j = "move_visual_line_down"
down = "move_visual_line_down"
k = "move_visual_line_up"
up = "move_visual_line_up"
l = "move_char_right"
right = "move_char_right"

# Character search
t = "find_till_char"
f = "find_next_char"
T = "till_prev_char"
F = "find_prev_char"

# Replace — R displaced to A-r; A-. displaced to .
r = "replace"
R = "no_op"
"A-r" = "replace_with_yanked"
"." = "repeat_last_motion"
"A-." = "no_op"

# Case
"~" = "switch_case"
"`" = "switch_to_lowercase"
"A-`" = "no_op"

# Line start/end — disabled in favour of g-h/g-l
home = "no_op"
end = "no_op"

# Word movement
w = "move_next_word_start"
b = "move_prev_word_start"
e = "move_next_word_end"
W = "move_next_long_word_start"
B = "move_prev_long_word_start"
E = "move_next_long_word_end"

# Sub-word movement on Alt (displaces default parent-node movement)
"A-w" = "move_next_sub_word_start"
"A-b" = "move_prev_sub_word_start"
"A-e" = "move_next_sub_word_end"

# Mode switches
v = "select_mode"
G = "no_op"
V = ["select_mode", "extend_to_line_end"]

# Insert
i = "insert_mode"
I = "insert_at_line_start"
a = "append_mode"
A = "insert_at_line_end"
o = "open_below"
O = "open_above"

# Delete/change — Alt keeps in register, plain discards
d = "delete_selection_noyank"
"A-d" = "delete_selection"
c = "change_selection_noyank"
"A-c" = "change_selection"

# Multi-selection copy/split
C = "copy_selection_on_next_line"
"A-C" = "no_op"
S = "no_op"
s = "select_regex"
"A-s" = "no_op"
"A-minus" = "no_op"
"A-_" = "no_op"

# Collapse/flip — A-; disabled (moved to , minor mode)
";" = ["keep_primary_selection", "collapse_selection"]
"A-;" = "no_op"
"A-:" = "no_op"

# Tree-sitter selection — hjkl-style on Alt, displacing default A-o/i/p/n
"A-k" = "expand_selection"
"A-j" = "shrink_selection"
"A-h" = "select_prev_sibling"
"A-l" = "select_next_sibling"
"A-a" = "select_all_siblings"
"A-I" = "select_all_children"

# Disable default tree-sitter keys (moved above)
"A-o" = "no_op"
"A-i" = "no_op"
"A-p" = "no_op"
"A-n" = "no_op"
"A-up" = "no_op"
"A-down" = "no_op"
"A-left" = "no_op"
"A-right" = "no_op"
"A-S-down" = "no_op"

# Line selection — x/X swapped vs upstream (x=bounds, X=extend)
x = "extend_to_line_bounds"
X = "extend_line"
"A-x" = "shrink_to_line_bounds"

# Select all
"%" = "select_all"

# Search
"/" = "search"
"?" = "rsearch"
n = "search_next"
N = "search_prev"
"*" = "search_selection_detect_word_boundaries"
"A-*" = "search_selection"

# History — u/U are earlier/later (checkpoint-based); undo/redo not bound
u = "earlier"
U = "later"
"A-u" = "no_op"
"A-U" = "no_op"

# Yank/paste
y = "yank"
Y = "yank_joined"
p = "paste_after"
P = "paste_before"
"\"" = "no_op"
"'" = "select_register"

# Macro — q=replay, A-q=record (Q disabled)
q = "replay_macro"
"A-q" = "record_macro"
Q = "no_op"

# Indent/format
">" = "indent"
"<" = "unindent"
"=" = "format_selections"

# Join — J=join_space (common case), A-J disabled
J = "join_selections_space"
"A-J" = "no_op"

# Selection management — moved to , minor mode; & disabled
K = "no_op"
"A-K" = "no_op"
"&" = "no_op"
"_" = "trim_selections"
"A-," = "no_op"
"(" = "no_op"
")" = "no_op"
"A-(" = "no_op"
"A-)" = "no_op"

# Shell — | and A-| swapped vs upstream (| pipes to, A-| pipes through)
"|" = "shell_pipe_to"
"A-|" = "shell_pipe"
"!" = "no_op"
"A-!" = "no_op"
"$" = "shell_keep_pipe"

# Increment/decrement — moved from C-a/C-x to +/-
"+" = "increment"
minus = "decrement"
"C-a" = "no_op"
"C-x" = "no_op"

# Page movement — C-j/C-k (half page), C-b/C-f (full page)
"C-j" = "page_cursor_half_down"
"C-k" = "page_cursor_half_up"
"C-u" = "no_op"
"C-d" = "no_op"
"C-b" = "page_up"
pageup = "page_up"
"C-f" = "page_down"
pagedown = "page_down"

# Jumplist
# TODO: add more jumplist functionality, make more operations add to jumplist
"C-i" = "jump_forward"
"C-o" = "jump_backward"
"C-s" = "no_op"

# Comments
"C-c" = "no_op"

# Misc
esc = "normal_mode"
"C-z" = "suspend"

