# ─────────────────────────────────────────────────────────────────────────────

[keys.normal.g]
g = "goto_file_start"
"|" = "goto_column"
e = "goto_last_line"
f = "goto_file"
h = "goto_line_start"
l = "goto_line_end"
s = "goto_first_nonwhitespace"
d = "goto_definition"
D = "goto_declaration"
y = "goto_type_definition"
r = "goto_reference"
i = "goto_implementation"
t = "goto_window_top"
c = "goto_window_center"
b = "goto_window_bottom"
a = "goto_last_accessed_file"
m = "goto_last_modified_file"
n = "goto_next_buffer"
p = "goto_previous_buffer"
k = "move_line_up"
j = "move_line_down"
"." = "goto_last_modification"
w = "goto_word"

# ─────────────────────────────────────────────────────────────────────────────
